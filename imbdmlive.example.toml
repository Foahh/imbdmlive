# Bilibili live room id to connect to.
room_id = "1597760"

# Optional cookie string. Leave unset or use an empty value to try browser auto-detection.
# cookies = ""

# Overlay font size in pixels.
font_size = 20.0

# Overlay window background opacity, from 0.0 to 1.0.
opacity = 0.55

# Where the overlay window is pinned on screen. 
# One of: top-left, top, top-right, left, center, right, bottom-left, bottom, bottom-right
anchor = "top-left"

# Pixel offset inward from the anchor.
offset = [16.0, 16.0]

# Overlay window size in pixels.
size = [420.0, 320.0]

# Global log level: off, error, warn, info, debug, trace.
log_level = "info"
